name: Build Kernel - r8s (SM-G780F)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Exynos 990 Kernel
    runs-on: ubuntu-24.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Dependências do sistema ─────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev libncurses-dev \
            lz4 python3 rsync unzip wget zstd \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      # ── 3. Toolchain – Neutron Clang ───────────────────────────────────────
      - name: Download Neutron Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang

          LATEST=$(curl -sL \
            https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest \
            | grep "browser_download_url" | grep "tar.zst" | head -1 \
            | cut -d '"' -f 4)

          echo "Baixando: $LATEST"
          curl -L "$LATEST" -o clang.tar.zst
          tar --use-compress-program=unzstd -xf clang.tar.zst
          rm clang.tar.zst

          echo "$HOME/clang/bin" >> $GITHUB_PATH
          $HOME/clang/bin/clang --version

      # ── 4. Build ───────────────────────────────────────────────────────────
      # O build.sh apenas faz `make defconfig && make -j16`.
      # O make herda CC, CROSS_COMPILE etc do ambiente abaixo.
      - name: Build kernel
        run: |
          chmod +x build.sh
          bash build.sh
        env:
          # Android / platform vars (já estão no build.sh, mas garantir)
          SEC_BUILD_CONF_VENDOR_BUILD_OS: "13"
          PLATFORM_VERSION: "13"
          ANDROID_MAJOR_VERSION: "T"
          ARCH: arm64
          SUBARCH: arm64

          # Toolchain
          CC: clang
          CLANG_TRIPLE: aarch64-linux-gnu-
          CROSS_COMPILE: aarch64-linux-gnu-
          CROSS_COMPILE_ARM32: arm-linux-gnueabihf-
          CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-

          # LLVM utils (evita usar binutils do host para operações LLVM)
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          STRIP: llvm-strip

      # ── 5. Localiza a imagem gerada ────────────────────────────────────────
      - name: Locate output image
        id: find_image
        run: |
          for f in \
            arch/arm64/boot/Image \
            arch/arm64/boot/Image.gz \
            out/arch/arm64/boot/Image \
            out/arch/arm64/boot/Image.gz; do
            if [ -f "$f" ]; then
              echo "IMAGE_PATH=$f" >> $GITHUB_OUTPUT
              echo "Imagem: $f ($(du -sh $f | cut -f1))"
              break
            fi
          done

          for dtb in arch/arm64/boot/dtb.img out/dtb.img; do
            if [ -f "$dtb" ]; then
              echo "DTB_PATH=$dtb" >> $GITHUB_OUTPUT
              echo "DTB: $dtb"
              break
            fi
          done

      # ── 6. Upload ──────────────────────────────────────────────────────────
      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-r8s-${{ github.run_number }}
          path: |
            ${{ steps.find_image.outputs.IMAGE_PATH }}
            ${{ steps.find_image.outputs.DTB_PATH }}
          if-no-files-found: error
          retention-days: 7

      # ── 7. Resumo ──────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Build concluido" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|:------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | SM-G780F (r8s) |" >> $GITHUB_STEP_SUMMARY
          echo "| SoC | Exynos 9830 (990) |" >> $GITHUB_STEP_SUMMARY
          echo "| Defconfig | exynos9830-r8slte_defconfig |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain | Neutron Clang |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.find_image.outputs.IMAGE_PATH }} |" >> $GITHUB_STEP_SUMMARY
