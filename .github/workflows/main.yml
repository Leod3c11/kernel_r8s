name: Build Kernel - r8s (SM-G780F) - SIMPLE

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Exynos 990 Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev libncurses-dev \
            lz4 python3 rsync unzip wget zstd \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            clang-14 llvm-14 lld-14

      - name: Setup Clang 14 toolchain
        run: |
          mkdir -p $HOME/clang14/bin
          ln -sf /usr/bin/clang-14 $HOME/clang14/bin/clang
          ln -sf /usr/bin/clang++-14 $HOME/clang14/bin/clang++
          ln -sf /usr/bin/llvm-ar-14 $HOME/clang14/bin/llvm-ar
          ln -sf /usr/bin/llvm-nm-14 $HOME/clang14/bin/llvm-nm
          ln -sf /usr/bin/llvm-objcopy-14 $HOME/clang14/bin/llvm-objcopy
          ln -sf /usr/bin/llvm-objdump-14 $HOME/clang14/bin/llvm-objdump
          ln -sf /usr/bin/llvm-strip-14 $HOME/clang14/bin/llvm-strip
          ln -sf /usr/bin/lld-14 $HOME/clang14/bin/ld.lld
          echo "$HOME/clang14/bin" >> $GITHUB_PATH
          clang-14 --version

      - name: Setup hardcoded toolchain path
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r349610-jopp
          ln -s $HOME/clang14/bin toolchain/clang/host/linux-x86/clang-r349610-jopp/bin

      - name: Build kernel
        run: bash build.sh
        env:
          SEC_BUILD_CONF_VENDOR_BUILD_OS: "13"
          PLATFORM_VERSION: "13"
          ANDROID_MAJOR_VERSION: "T"
          ARCH: arm64
          SUBARCH: arm64
          CC: clang
          CLANG_TRIPLE: aarch64-linux-gnu-
          CROSS_COMPILE: aarch64-linux-gnu-
          CROSS_COMPILE_ARM32: arm-linux-gnueabihf-
          CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          STRIP: llvm-strip
          AS: aarch64-linux-gnu-as

      - name: Find artifacts
        if: always()
        run: |
          echo "Searching for kernel image..."
          find . -name "Image*" -o -name "*.img" 2>/dev/null | head -20

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-r8s-${{ github.run_number }}
          path: |
            arch/arm64/boot/Image*
            out/dtb.img
            out/arch/arm64/boot/Image*
          if-no-files-found: warn
          retention-days: 7
