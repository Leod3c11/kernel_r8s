name: Build Kernel - r8s (SM-G780F)

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device model (r8s, etc)'
        required: true
        default: 'r8s'
      ksu:
        description: 'Include KernelSU?'
        required: true
        type: choice
        options:
          - 'n'
          - 'y'
        default: 'n'
      ccache:
        description: 'Use ccache?'
        required: true
        type: choice
        options:
          - 'n'
          - 'y'
        default: 'y'

jobs:
  build:
    name: Compile Exynos 990 Kernel
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          echo "Installing build dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev libncurses-dev \
            lz4 python3 rsync unzip wget zstd ccache \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      - name: Build kernel
        run: bash build.sh -m ${{ inputs.model }} -k ${{ inputs.ksu }} -c ${{ inputs.ccache }}

      - name: Find build artifacts
        if: always()
        run: |
          echo "=== Searching for build artifacts ==="
          find build/out -type f -name "*.zip" -o -name "*.img" 2>/dev/null | head -20
          find out/arch/arm64/boot -type f 2>/dev/null | head -20
          
          echo "=== Directory structure ==="
          ls -lah build/out/ 2>/dev/null || echo "build/out not found"

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.model }}-${{ github.run_number }}
          path: |
            build/out/*/*.zip
            build/out/*/boot.img
            build/out/*/dtbo.img
            build/out/*/dtb.img
            build/out/*/Image
            out/arch/arm64/boot/Image*
          if-no-files-found: warn
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | ${{ inputs.model }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KernelSU | ${{ inputs.ksu }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ccache | ${{ inputs.ccache }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find build/out -type f \( -name "*.zip" -o -name "*.img" \) 2>/dev/null | sed 's|^|  - |' >> $GITHUB_STEP_SUMMARY || echo "  (no artifacts found)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
