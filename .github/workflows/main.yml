name: Build Kernel - r8s (SM-G780F)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Exynos 990 Kernel
    runs-on: ubuntu-24.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Dependências do sistema ─────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev libncurses-dev \
            lz4 python3 rsync unzip wget zstd \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      # ── 3. Toolchain – Clang 12 via LLVM apt ──────────────────────────────
      - name: Install Clang 12
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh | sudo bash -s -- 12
          sudo apt-get install -y --no-install-recommends \
            clang-12 llvm-12 lld-12

          # Cria wrappers sem sufixo para o symlink e para o PATH
          mkdir -p $HOME/clang12/bin
          for tool in clang clang++ ld.lld llvm-ar llvm-nm \
                      llvm-objcopy llvm-objdump llvm-strip; do
            REAL=$(which ${tool}-12 2>/dev/null)
            [ -n "$REAL" ] && ln -sf "$REAL" $HOME/clang12/bin/$tool
          done
          # lld pode se chamar lld-12 mas o wrapper precisa ser ld.lld
          [ -f $HOME/clang12/bin/ld.lld ] || ln -sf $(which lld-12) $HOME/clang12/bin/ld.lld

          echo "$HOME/clang12/bin" >> $GITHUB_PATH
          clang-12 --version

      # ── 4. Symlink para o CC hardcoded no Makefile (linha 374) ────────────
      - name: Symlink toolchain to hardcoded Makefile path
        run: |
          HARDCODED="toolchain/clang/host/linux-x86/clang-r349610-jopp"
          mkdir -p "$HARDCODED"
          ln -s $HOME/clang12/bin "$HARDCODED/bin"
          echo "Symlink: $(ls -la $HARDCODED/bin/clang)"

      # ── 5. Patch crítico no Makefile ──────────────────────────────────────
      # Linha 506: CLANG_FLAGS += -no-integrated-as
      # Isso força o Clang a chamar o /usr/bin/as externo (x86_64!), que
      # não entende flags ARM como -EL. Trocamos para -integrated-as para
      # que o Clang use seu próprio assembler interno (IAS).
      - name: Patch Makefile - replace -no-integrated-as with -integrated-as
        run: |
          grep -n "no-integrated-as" Makefile
          sed -i 's/-no-integrated-as/-integrated-as/g' Makefile
          echo "--- Patch aplicado ---"
          grep -n "integrated-as" Makefile

      # ── 6. Build ───────────────────────────────────────────────────────────
      - name: Build kernel
        run: bash build.sh
        env:
          SEC_BUILD_CONF_VENDOR_BUILD_OS: "13"
          PLATFORM_VERSION: "13"
          ANDROID_MAJOR_VERSION: "T"
          ARCH: arm64
          SUBARCH: arm64
          CC: clang
          CLANG_TRIPLE: aarch64-linux-gnu-
          CROSS_COMPILE: aarch64-linux-gnu-
          CROSS_COMPILE_ARM32: arm-linux-gnueabihf-
          CROSS_COMPILE_COMPAT: arm-linux-gnueabihf-
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          STRIP: llvm-strip

      # ── 7. Localiza a imagem gerada ────────────────────────────────────────
      - name: Locate output image
        id: find_image
        run: |
          for f in \
            arch/arm64/boot/Image \
            arch/arm64/boot/Image.gz \
            out/arch/arm64/boot/Image \
            out/arch/arm64/boot/Image.gz; do
            if [ -f "$f" ]; then
              echo "IMAGE_PATH=$f" >> $GITHUB_OUTPUT
              echo "Imagem: $f ($(du -sh $f | cut -f1))"
              break
            fi
          done

          for dtb in arch/arm64/boot/dtb.img out/dtb.img; do
            if [ -f "$dtb" ]; then
              echo "DTB_PATH=$dtb" >> $GITHUB_OUTPUT
              echo "DTB: $dtb"
              break
            fi
          done

      # ── 8. Upload ──────────────────────────────────────────────────────────
      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-r8s-${{ github.run_number }}
          path: |
            ${{ steps.find_image.outputs.IMAGE_PATH }}
            ${{ steps.find_image.outputs.DTB_PATH }}
          if-no-files-found: error
          retention-days: 7

      # ── 9. Resumo ──────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Build concluido" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|:------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | SM-G780F (r8s) |" >> $GITHUB_STEP_SUMMARY
          echo "| SoC | Exynos 9830 (990) |" >> $GITHUB_STEP_SUMMARY
          echo "| Defconfig | exynos9830-r8slte_defconfig |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain | Clang 12 (LLVM apt) |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.find_image.outputs.IMAGE_PATH }} |" >> $GITHUB_STEP_SUMMARY
